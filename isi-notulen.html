<!DOCTYPE html>
<html lang="id" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>E-Notulensi - SITARA DPMPTSP</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; }
        .bg-pola { background-image: radial-gradient(#cbd5e1 1px, transparent 1px); background-size: 20px 20px; }
        textarea::-webkit-scrollbar { width: 8px; }
        textarea::-webkit-scrollbar-track { background: #f1f5f9; border-radius: 8px; }
        textarea::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 8px; }
        textarea::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
        #preview-container::-webkit-scrollbar { height: 6px; }
        #preview-container::-webkit-scrollbar-thumb { background: #fbbf24; border-radius: 8px; }
    </style>
</head>
<body class="bg-pola text-slate-800 antialiased min-h-screen py-8 px-4 flex justify-center">

    <div class="w-full max-w-3xl bg-white rounded-[2.5rem] shadow-2xl border border-slate-100 overflow-hidden relative flex flex-col">
        
        <div class="bg-amber-500 p-8 text-center relative overflow-hidden">
            <div class="absolute top-0 left-0 w-full h-full bg-[radial-gradient(ellipse_at_top_right,_var(--tw-gradient-stops))] from-amber-400 via-transparent to-transparent"></div>
            <div class="flex justify-center items-center gap-3 mb-4 relative z-10">
                <img src="assets/img/morowali.png" alt="Logo Morowali" class="h-10 w-auto drop-shadow-md">
                <img src="assets/img/logo_mpp.webp" alt="Logo MPP" class="h-10 w-auto drop-shadow-md bg-white rounded-lg p-0.5">
            </div>
            <h1 class="text-2xl font-black text-slate-900 tracking-tight relative z-10">Formulir E-Notulensi</h1>
            <p class="text-[10px] font-bold text-amber-900 uppercase tracking-widest mt-1 relative z-10">SITARA - Petugas Rapat</p>
        </div>

        <div id="info-rapat" class="bg-slate-50 border-b border-slate-200 p-6 text-center">
            <div class="animate-pulse flex flex-col items-center gap-2">
                <div class="h-4 bg-slate-200 rounded w-1/2"></div>
                <div class="h-3 bg-slate-200 rounded w-1/3"></div>
            </div>
        </div>

        <div class="p-8 space-y-8 flex-1">
            
            <div class="grid grid-cols-1 md:grid-cols-2 gap-5">
                <div>
                    <label class="text-[10px] font-extrabold text-slate-400 uppercase tracking-widest ml-1 block mb-2">Pimpinan Rapat</label>
                    <input type="text" id="pimpinan" class="w-full p-4 bg-slate-50 border border-slate-200 rounded-2xl outline-none focus:ring-2 focus:ring-amber-500 transition-all font-semibold text-slate-700" placeholder="Contoh: Elyta Gawi, S.T., M.T.">
                </div>
                <div>
                    <label class="text-[10px] font-extrabold text-slate-400 uppercase tracking-widest ml-1 block mb-2">Nama Notulis</label>
                    <input type="text" id="notulis" class="w-full p-4 bg-slate-50 border border-slate-200 rounded-2xl outline-none focus:ring-2 focus:ring-amber-500 transition-all font-semibold text-slate-700" placeholder="Nama Anda...">
                </div>
            </div>

            <div>
                <label class="text-[10px] font-extrabold text-slate-400 uppercase tracking-widest ml-1 block mb-2">Uraian / Pembahasan Rapat</label>
                <div class="relative">
                    <textarea id="pembahasan" rows="8" class="w-full p-5 bg-slate-50 border border-slate-200 rounded-2xl outline-none focus:ring-2 focus:ring-amber-500 transition-all text-sm leading-relaxed text-slate-700 resize-y" placeholder="Catat poin-poin penting, tanggapan, dan masukan peserta di sini..."></textarea>
                    <div class="absolute top-4 right-4 text-slate-300 pointer-events-none">
                        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"></path></svg>
                    </div>
                </div>
            </div>

            <div>
                <label class="text-[10px] font-extrabold text-slate-400 uppercase tracking-widest ml-1 block mb-2">Kesimpulan / Hasil Rapat</label>
                <textarea id="kesimpulan" rows="5" class="w-full p-5 bg-slate-50 border border-slate-200 rounded-2xl outline-none focus:ring-2 focus:ring-emerald-500 transition-all text-sm leading-relaxed text-slate-700 resize-y font-medium shadow-inner" placeholder="Tuliskan hasil akhir kesepakatan atau tindak lanjut dari rapat ini..."></textarea>
            </div>

            <div>
                <div class="flex justify-between items-end mb-2">
                    <label class="text-[10px] font-extrabold text-slate-400 uppercase tracking-widest ml-1 block">Foto Dokumentasi (Opsional)</label>
                    <span id="foto-counter" class="text-[9px] font-bold text-slate-400 bg-slate-100 px-2 py-1 rounded-md">0 / 5 Foto</span>
                </div>
                
                <div class="flex flex-col sm:flex-row gap-4 items-start">
                    <div class="relative w-full sm:w-1/3 min-h-[150px]">
                        <input type="file" id="foto-upload" accept="image/*" multiple onchange="handleFileUpload(event)" class="absolute inset-0 w-full h-full opacity-0 cursor-pointer z-10" title="Pilih foto dokumentasi">
                        <div class="bg-white border-2 border-dashed border-slate-300 rounded-2xl p-6 flex flex-col items-center justify-center gap-2 w-full h-full text-center group hover:border-amber-500 hover:bg-amber-50 transition-all">
                            <div class="bg-amber-100 text-amber-600 p-3 rounded-full group-hover:scale-110 transition-transform">
                                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"></path></svg>
                            </div>
                            <span class="text-xs font-bold text-slate-600">Tambah Foto</span>
                            <span class="text-[9px] text-slate-400">*Otomatis dikompres</span>
                        </div>
                    </div>

                    <div id="preview-container" class="hidden w-full sm:w-2/3 flex gap-3 overflow-x-auto py-2 px-1">
                        </div>
                </div>
            </div>

            <button onclick="submitNotulen()" id="btn-submit" class="w-full py-5 mt-6 bg-slate-900 text-white rounded-2xl font-extrabold uppercase text-xs tracking-widest shadow-xl hover:bg-slate-800 active:scale-95 transition-all flex justify-center items-center gap-2">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7H5a2 2 0 00-2 2v9a2 2 0 002 2h14a2 2 0 002-2V9a2 2 0 00-2-2h-3m-1 4l-3 3m0 0l-3-3m3 3V4"></path></svg>
                <span id="btn-submit-text">SIMPAN KE DATABASE</span>
            </button>

        </div>
        <div class="text-center py-4 bg-slate-50 border-t border-slate-100 mt-auto">
            <p class="text-[9px] font-bold text-slate-400 uppercase tracking-widest">&copy; 2026 Powered by FOUNDERLAN</p>
        </div>
    </div>

    <script>
        const GOOGLE_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwKE3Se0Y-Kouz4McrLaEo6k7kbq-ee_ZNQVt8SwLVsxUiS2yMCF1ooDSJlAkd5eThIkw/exec";
        
        const urlParams = new URLSearchParams(window.location.search);
        const idRapat = urlParams.get('id');
        let uploadedImagesBase64 = [];
        let existingDokumentasiUrls = ""; 

        // ----- FITUR KRUSIAL: KOMPRESI FOTO DIKEMBALIKAN -----
        function compressImage(file, maxWidth, maxHeight, quality) {
            return new Promise((resolve) => {
                const reader = new FileReader();
                reader.readAsDataURL(file);
                reader.onload = (event) => {
                    const img = new Image();
                    img.src = event.target.result;
                    img.onload = () => {
                        let width = img.width; let height = img.height;
                        if (width > height) { if (width > maxWidth) { height *= maxWidth / width; width = maxWidth; }
                        } else { if (height > maxHeight) { width *= maxHeight / height; height = maxHeight; } }
                        const canvas = document.createElement('canvas');
                        canvas.width = width; canvas.height = height;
                        const ctx = canvas.getContext('2d');
                        ctx.drawImage(img, 0, 0, width, height);
                        resolve(canvas.toDataURL('image/jpeg', quality));
                    };
                };
            });
        }

        async function handleFileUpload(event) {
            const files = event.target.files;
            const previewContainer = document.getElementById('preview-container');
            previewContainer.classList.remove('hidden');

            for (let i = 0; i < files.length; i++) {
                if (uploadedImagesBase64.length >= 5) {
                    Swal.fire({ icon: 'warning', title: 'Batas Maksimal', text: 'Maksimal hanya 5 foto baru yang dapat diunggah sekaligus.', confirmButtonColor: '#0f172a' });
                    break;
                }
                const file = files[i];
                // Panggil kembali fungsi kompresi gambar
                const compressedBase64 = await compressImage(file, 1024, 1024, 0.7);
                uploadedImagesBase64.push(compressedBase64);

                const wrapper = document.createElement('div');
                wrapper.className = "relative h-[150px] w-[150px] flex-shrink-0 animate-fade-in";
                wrapper.innerHTML = `<img src="${compressedBase64}" class="h-full w-full object-cover rounded-2xl border border-slate-200 shadow-sm"><div class="absolute top-2 right-2 bg-emerald-500 text-white text-[8px] font-bold px-2 py-1 rounded-md shadow-md uppercase tracking-widest">OK</div>`;
                previewContainer.appendChild(wrapper);
            }

            const prefix = existingDokumentasiUrls ? `<span class="text-emerald-600 font-extrabold">Tersimpan</span> | Baru: ` : "";
            document.getElementById('foto-counter').innerHTML = `${prefix}${uploadedImagesBase64.length} / 5 Foto`;
            document.getElementById('foto-upload').value = ""; 
        }

        async function muatInfoRapat() {
            if (!idRapat) {
                document.getElementById('info-rapat').innerHTML = '<p class="text-red-500 font-bold text-sm">ID Rapat tidak ditemukan. Akses ditolak.</p>';
                document.getElementById('btn-submit').disabled = true;
                Swal.fire({ icon: 'error', title: 'Akses Ditolak', text: 'URL tidak valid. Silakan scan QR Code.', confirmButtonColor: '#0f172a' });
                return;
            }

            try {
                const response = await fetch(GOOGLE_SCRIPT_URL, { method: 'POST', body: JSON.stringify({ formType: 'getDetailRapat', idRapat: idRapat }) });
                const res = await response.json();
                
                if (res.status === "success" && res.data) {
                    const rapat = res.data;

                    if (rapat.status !== "AKTIF") {
                        document.getElementById('info-rapat').innerHTML = `
                            <h2 class="text-lg font-black text-slate-800 leading-tight mb-2">${rapat.nama}</h2>
                            <span class="bg-red-100 text-red-600 px-3 py-1 rounded-full text-[10px] font-extrabold tracking-widest border border-red-200 uppercase">LAPORAN TERKUNCI (SELESAI)</span>
                        `;
                        const btn = document.getElementById('btn-submit');
                        btn.disabled = true;
                        btn.classList.replace('bg-slate-900', 'bg-slate-400');
                        document.getElementById('btn-submit-text').innerText = 'AKSES DITUTUP';
                        
                        document.getElementById('pimpinan').disabled = true;
                        document.getElementById('notulis').disabled = true;
                        document.getElementById('pembahasan').disabled = true;
                        document.getElementById('kesimpulan').disabled = true;
                        document.getElementById('foto-upload').disabled = true;
                        
                        Swal.fire({ icon: 'warning', title: 'Rapat Selesai', text: 'Status rapat ini sudah tidak aktif. Anda hanya bisa melihat data tanpa bisa mengubahnya.', confirmButtonColor: '#0f172a' });
                    }
                    
                    const tgl = new Date(rapat.tgl).toLocaleDateString('id-ID', { weekday: 'long', day: '2-digit', month: 'long', year: 'numeric' });
                    let jamTampil = "";
                    if (rapat.waktu) {
                        if (/^\d{2}[:.]\d{2}/.test(rapat.waktu)) {
                            jamTampil = rapat.waktu.replace('.', ':'); 
                        } else {
                            try {
                                const dJam = new Date(rapat.waktu);
                                if (!isNaN(dJam.getTime())) { jamTampil = dJam.toLocaleTimeString('id-ID', { hour: '2-digit', minute: '2-digit' }); } 
                                else { jamTampil = rapat.waktu; }
                            } catch(e) { jamTampil = rapat.waktu; }
                        }
                    }
                    const jamHtml = jamTampil ? `<span>•</span><span>${jamTampil} WITA</span>` : "";
                    
                    if (rapat.status === "AKTIF") {
                        document.getElementById('info-rapat').innerHTML = `
                            <h2 class="text-lg font-black text-slate-800 leading-tight mb-2">${rapat.nama}</h2>
                            <div class="flex flex-wrap items-center justify-center gap-2 text-[11px] font-semibold text-slate-500">
                                <span class="bg-amber-100 text-amber-700 px-2 py-1 rounded border border-amber-200">ID: ${rapat.id}</span>
                                <span>•</span><span>${tgl}</span>${jamHtml}
                            </div>
                        `;
                    }

                    if (rapat.notulen && rapat.notulen.trim() !== "") {
                        const rawText = rapat.notulen;
                        try {
                            const strPimpinan = rawText.split('[PIMPINAN RAPAT]')[1].split('[NOTULIS]')[0].trim();
                            const strNotulis = rawText.split('[NOTULIS]')[1].split('[PEMBAHASAN]')[0].trim();
                            const strPembahasan = rawText.split('[PEMBAHASAN]')[1].split('[KESIMPULAN & HASIL]')[0].trim();
                            
                            let strHasil = "";
                            if (rawText.includes('[DOKUMENTASI]')) {
                                strHasil = rawText.split('[KESIMPULAN & HASIL]')[1].split('[DOKUMENTASI]')[0].trim();
                                existingDokumentasiUrls = rawText.split('[DOKUMENTASI]')[1].trim(); 
                                
                                const oldUrls = existingDokumentasiUrls.split(',').filter(x => x.trim() !== "");
                                const countOld = oldUrls.length;
                                
                                if(countOld > 0) {
                                    document.getElementById('foto-counter').innerHTML = `<span class="text-emerald-600 font-extrabold">${countOld} Foto Tersimpan</span> | Baru: 0/5`;
                                    const previewContainer = document.getElementById('preview-container');
                                    previewContainer.classList.remove('hidden');
                                    
                                    oldUrls.forEach(url => {
                                        const wrapper = document.createElement('div');
                                        wrapper.className = "relative h-[150px] w-[150px] flex-shrink-0 animate-fade-in opacity-90 hover:opacity-100 transition-opacity";
                                        
                                        const imgElement = document.createElement('img');
                                        imgElement.src = url.trim();
                                        imgElement.className = "h-full w-full object-cover rounded-2xl border border-slate-200 shadow-sm";
                                        
                                        imgElement.onerror = function() {
                                            this.outerHTML = `<div class="flex flex-col items-center justify-center w-full h-full bg-slate-50 rounded-2xl text-slate-400 border border-slate-200"><svg class="w-8 h-8 mb-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"></path></svg><span class="text-[9px] font-bold uppercase tracking-widest text-slate-500">File Tersimpan</span></div>`;
                                        };

                                        const badge = document.createElement('div');
                                        badge.className = "absolute top-2 right-2 bg-slate-800 text-white text-[8px] font-bold px-2 py-1 rounded-md shadow-md uppercase tracking-widest";
                                        badge.innerText = "Tersimpan";

                                        wrapper.appendChild(imgElement);
                                        wrapper.appendChild(badge);
                                        previewContainer.appendChild(wrapper);
                                    });
                                }
                            } else {
                                strHasil = rawText.split('[KESIMPULAN & HASIL]')[1].trim();
                            }

                            document.getElementById('pimpinan').value = strPimpinan;
                            document.getElementById('notulis').value = strNotulis;
                            document.getElementById('pembahasan').value = strPembahasan;
                            document.getElementById('kesimpulan').value = strHasil;
                            
                            if (rapat.status === "AKTIF") {
                                document.getElementById('btn-submit-text').innerText = "UPDATE LAPORAN KE DATABASE";
                            }
                            
                        } catch(e) {
                            document.getElementById('pembahasan').value = rawText;
                            if (rapat.status === "AKTIF") document.getElementById('btn-submit-text').innerText = "UPDATE LAPORAN KE DATABASE";
                        }
                    }

                } else {
                    document.getElementById('info-rapat').innerHTML = '<p class="text-red-500 font-bold text-sm">Agenda tidak ditemukan.</p>';
                    document.getElementById('btn-submit').disabled = true;
                }
            } catch (err) {
                document.getElementById('info-rapat').innerHTML = '<p class="text-red-500 font-bold text-sm">Gagal terhubung ke server.</p>';
            }
        }
        window.addEventListener('DOMContentLoaded', muatInfoRapat);

        async function submitNotulen() {
            const pimpinan = document.getElementById('pimpinan').value.trim() || "-";
            const notulis = document.getElementById('notulis').value.trim() || "-";
            const pembahasan = document.getElementById('pembahasan').value.trim() || "-";
            const kesimpulan = document.getElementById('kesimpulan').value.trim();
            
            if (!kesimpulan) {
                return Swal.fire({ icon: 'warning', title: 'Data Belum Lengkap', text: 'Kolom Kesimpulan / Hasil Rapat wajib diisi!', confirmButtonColor: '#0f172a' });
            }

            const formatNotulen = `[PIMPINAN RAPAT]\n${pimpinan}\n\n[NOTULIS]\n${notulis}\n\n[PEMBAHASAN]\n${pembahasan}\n\n[KESIMPULAN & HASIL]\n${kesimpulan}`;

            Swal.fire({
                title: existingDokumentasiUrls ? 'Update Laporan?' : 'Simpan Laporan?',
                text: "Data akan direkam ke database spreadsheet.",
                icon: 'question',
                showCancelButton: true,
                confirmButtonColor: '#0f172a',
                cancelButtonColor: '#64748b',
                confirmButtonText: 'Ya, Lanjutkan',
                cancelButtonText: 'Batal'
            }).then(async (result) => {
                if (result.isConfirmed) {
                    
                    const btn = document.getElementById('btn-submit');
                    const originalText = document.getElementById('btn-submit-text').innerText;
                    document.getElementById('btn-submit-text').innerHTML = 'Memproses...';
                    btn.disabled = true;
                    Swal.fire({ title: 'Menyimpan Notulensi...', allowOutsideClick: false, didOpen: () => Swal.showLoading() });

                    try {
                        const response = await fetch(GOOGLE_SCRIPT_URL, {
                            method: 'POST',
                            body: JSON.stringify({ 
                                formType: 'simpanNotulen', 
                                idRapat: idRapat, 
                                isiNotulen: formatNotulen,
                                dokumentasi: uploadedImagesBase64,
                                existingDokumentasi: existingDokumentasiUrls 
                            })
                        });
                        const res = await response.json();

                        if (res.status === "success") {
                            Swal.fire({
                                icon: 'success', title: 'Berhasil!', text: 'Laporan telah disimpan ke database.',
                                confirmButtonColor: '#10b981', allowOutsideClick: false
                            }).then(() => {
                                window.location.reload(); 
                            });
                        } else {
                            Swal.fire('Gagal!', 'Terjadi kesalahan sistem di server.', 'error');
                            document.getElementById('btn-submit-text').innerText = originalText; 
                            btn.disabled = false;
                        }
                    } catch (err) {
                        Swal.fire('Gagal Terhubung', 'Periksa koneksi jaringan Anda.', 'error');
                        document.getElementById('btn-submit-text').innerText = originalText; 
                        btn.disabled = false;
                    }
                }
            });
        }
    </script>
</body>
</html>
