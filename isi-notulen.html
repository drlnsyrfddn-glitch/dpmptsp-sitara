<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Input Notulensi - SITARA</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style> 
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; }
        div:where(.swal2-container) div:where(.swal2-popup) { font-family: 'Inter', sans-serif; border-radius: 1.5rem; }
    </style>
</head>
<body class="p-4 md:p-8">
    <div class="max-w-3xl mx-auto bg-white rounded-[2.5rem] shadow-xl border border-slate-200 overflow-hidden">
        
        <div class="bg-[#0f172a] p-8 text-white relative">
            <h1 class="text-2xl font-black uppercase italic tracking-tighter">SITARA <span class="text-blue-400">NOTULEN</span></h1>
            <p class="text-xs font-bold text-slate-400 mt-1 uppercase tracking-widest">Input Hasil Rapat Resmi Pemda Morowali</p>
            
            <div class="mt-8 p-5 bg-slate-800 rounded-2xl border border-slate-700 shadow-inner">
                <p class="text-[10px] text-emerald-400 font-bold uppercase tracking-widest mb-1"><i class="fa-solid fa-calendar-check mr-1"></i> Agenda Rapat Saat Ini:</p>
                <h2 id="nama-rapat" class="text-lg font-bold text-white">Memuat Data Rapat...</h2>
            </div>
        </div>
        
        <div class="p-8 space-y-6">
            
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <div>
                    <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest block mb-2">Pimpinan Rapat</label>
                    <input type="text" id="in-pimpinan" placeholder="Contoh: Elyta Gawi, S.T., M.T." class="w-full p-4 bg-slate-50 border border-slate-200 rounded-2xl outline-none focus:ring-2 focus:ring-blue-600 font-bold text-sm transition-all">
                </div>
                <div>
                    <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest block mb-2">Notulis / Sekretaris Rapat</label>
                    <input type="text" id="in-sekretaris" placeholder="Contoh: Derlan Syarifuddin, S.Kom" class="w-full p-4 bg-slate-50 border border-slate-200 rounded-2xl outline-none focus:ring-2 focus:ring-blue-600 font-bold text-sm transition-all">
                </div>
            </div>

            <hr class="border-slate-100 my-4">

            <div>
                <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest block mb-2">1. Pembukaan</label>
                <textarea id="in-pembukaan" placeholder="Ketikkan ringkasan sambutan pembukaan di sini..." class="w-full p-4 bg-slate-50 border border-slate-200 rounded-2xl outline-none focus:ring-2 focus:ring-blue-600 h-24 text-sm font-semibold transition-all"></textarea>
            </div>
            
            <div>
                <label class="text-[10px] font-black text-blue-600 uppercase tracking-widest block mb-2">2. Pembahasan / Jalannya Rapat</label>
                <textarea id="in-pembahasan" placeholder="Ketikkan detail jalannya rapat, usulan, dan tanggapan peserta..." class="w-full p-4 bg-blue-50 border border-blue-100 rounded-2xl outline-none focus:ring-2 focus:ring-blue-600 h-48 text-sm font-semibold transition-all"></textarea>
            </div>
            
            <div>
                <label class="text-[10px] font-black text-emerald-600 uppercase tracking-widest block mb-2">3. Keputusan / Hasil Rapat</label>
                <textarea id="in-keputusan" placeholder="1. Keputusan pertama...&#10;2. Keputusan kedua..." class="w-full p-4 bg-emerald-50 border border-emerald-100 rounded-2xl outline-none focus:ring-2 focus:ring-emerald-500 h-32 text-sm font-bold text-emerald-900 transition-all"></textarea>
            </div>
            
            <div>
                <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest block mb-2">4. Penutup</label>
                <textarea id="in-penutup" placeholder="Ketikkan ringkasan penutupan rapat di sini..." class="w-full p-4 bg-slate-50 border border-slate-200 rounded-2xl outline-none focus:ring-2 focus:ring-blue-600 h-24 text-sm font-semibold transition-all"></textarea>
            </div>

            <hr class="border-slate-100 my-4">

            <div>
                <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest block mb-2">Lampiran Dokumentasi (Opsional, Max 3 Foto)</label>
                <input type="file" id="in-foto" multiple accept="image/*" class="block w-full text-sm text-slate-500 file:mr-4 file:py-3 file:px-6 file:rounded-xl file:border-0 file:text-xs file:font-black file:bg-blue-50 file:text-blue-700 hover:file:bg-blue-100 cursor-pointer transition-all">
            </div>

            <button onclick="kirimNotulen()" id="btn-kirim" class="w-full py-5 mt-4 bg-[#0f172a] hover:bg-slate-800 text-white rounded-2xl font-black uppercase tracking-widest shadow-xl transition-all active:scale-95 flex justify-center items-center gap-2">
                SIMPAN HASIL RAPAT
            </button>
        </div>
    </div>

    <script>
        // MASUKKAN URL WEB APP BAPAK DI SINI
        const GOOGLE_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwKE3Se0Y-Kouz4McrLaEo6k7kbq-ee_ZNQVt8SwLVsxUiS2yMCF1ooDSJlAkd5eThIkw/exec";
        
        const urlParams = new URLSearchParams(window.location.search);
        const idRapat = urlParams.get('id');

        // FUNGSI INIT UNTUK MEMUAT NAMA RAPAT
        window.onload = async function() {
            if(!idRapat) {
                document.getElementById('nama-rapat').innerText = "ID Rapat Tidak Ditemukan!";
                document.getElementById('nama-rapat').classList.add('text-red-400');
                return;
            }

            try {
                const res = await fetch(GOOGLE_SCRIPT_URL, { method: 'POST', body: JSON.stringify({ formType: 'getDetailRapat', idRapat: idRapat }) });
                const resData = await res.json();
                
                if(resData.status === 'success') {
                    document.getElementById('nama-rapat').innerText = resData.data.nama;
                } else {
                    document.getElementById('nama-rapat').innerText = "Agenda tidak ditemukan.";
                }
            } catch(e) {
                document.getElementById('nama-rapat').innerText = "Gagal memuat data dari server.";
            }
        };

        // FUNGSI SIMPAN NOTULEN
        async function kirimNotulen() {
            if(!idRapat) {
                Swal.fire('Error', 'ID Rapat tidak valid!', 'error');
                return;
            }

            const btn = document.getElementById('btn-kirim');
            btn.disabled = true; 
            btn.innerHTML = `<div class="animate-spin rounded-full h-5 w-5 border-b-2 border-white mr-2"></div> MENGIRIM DATA...`;

            const data = {
                formType: "simpanNotulen",
                idRapat: idRapat,
                pimpinan: document.getElementById('in-pimpinan').value,
                sekretaris: document.getElementById('in-sekretaris').value,
                pembukaan: document.getElementById('in-pembukaan').value,
                pembahasan: document.getElementById('in-pembahasan').value,
                keputusan: document.getElementById('in-keputusan').value,
                penutup: document.getElementById('in-penutup').value,
                dokumentasi: []
            };

            // Handle Foto (Convert to Base64)
            const files = document.getElementById('in-foto').files;
            if(files.length > 3) {
                Swal.fire('Peringatan', 'Maksimal upload 3 foto dokumentasi!', 'warning');
                btn.disabled = false; 
                btn.innerHTML = `SIMPAN HASIL RAPAT`;
                return;
            }

            try {
                for (let file of files) {
                    const base64 = await new Promise(resolve => {
                        const reader = new FileReader();
                        reader.onload = () => resolve(reader.result);
                        reader.readAsDataURL(file);
                    });
                    data.dokumentasi.push(base64);
                }

                const response = await fetch(GOOGLE_SCRIPT_URL, { method: 'POST', body: JSON.stringify(data) });
                const resData = await response.json();

                if(resData.status === "success") {
                    Swal.fire({
                        icon: 'success',
                        title: 'Berhasil!',
                        text: 'Notulensi rapat telah tersimpan ke database.',
                        confirmButtonColor: '#0f172a'
                    }).then(() => {
                        window.close(); // Menutup tab otomatis setelah sukses
                    });
                } else {
                    Swal.fire('Error', resData.message || 'Gagal menyimpan data', 'error');
                }
            } catch (e) {
                Swal.fire('Error Koneksi', 'Gagal terhubung ke server Google.', 'error');
            } finally {
                btn.disabled = false; 
                btn.innerHTML = `SIMPAN HASIL RAPAT`;
            }
        }
    </script>
</body>
</html>
