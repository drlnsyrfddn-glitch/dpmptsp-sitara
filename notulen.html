<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SITARA - Notulen Rapat</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 text-slate-800 font-sans antialiased min-h-screen flex items-center justify-center py-10 px-4">

    <!-- Container diperlebar menjadi max-w-5xl untuk Desktop -->
    <div class="max-w-5xl w-full bg-white rounded-2xl shadow-sm border border-slate-200 p-8 md:p-10">
        
        <!-- Header Section -->
        <div class="flex flex-col md:flex-row justify-between items-center border-b border-slate-100 pb-8 mb-8 gap-6">
            <div class="text-center md:text-left">
                <h1 class="text-3xl font-extrabold text-slate-900 tracking-tight mb-2">Pengisian Notulen</h1>
                <p class="text-xs text-slate-500 font-medium tracking-wide">
                    SITARA <span class="mx-1 text-slate-300">•</span> Sistem Informasi Tata Rapat
                </p>
                <div class="mt-4 inline-block py-2 px-4 bg-slate-50 rounded-lg border border-slate-200/70 text-left">
                    <p class="text-sm font-semibold text-slate-800">Rapat Internal (Simulasi)</p>
                    <p class="text-xs text-slate-400 mt-0.5">Role: Petugas Notulis</p>
                </div>
            </div>
            
            <!-- Bagian Logo di Kanan untuk Desktop -->
            <div class="flex justify-center items-center gap-5">
                <img src="assets/img/morowali.png" alt="Logo Kabupaten Morowali" class="h-16 md:h-20 w-auto object-contain drop-shadow-sm">
                <img src="assets/img/logo_mpp.webp" alt="Logo MPP DPMPTSP" class="h-8 md:h-10 w-auto object-contain drop-shadow-sm">
            </div>
        </div>

        <!-- Form Section: Grid 2 Kolom pada Desktop -->
        <form id="formNotulen" class="grid grid-cols-1 md:grid-cols-3 gap-8">
            
            <!-- KOLOM KIRI: Area Input Teks (Mengambil 2/3 ruang) -->
            <div class="md:col-span-2 space-y-6">
                <!-- Agenda -->
                <div>
                    <label for="agenda" class="block text-sm font-semibold text-slate-700 mb-2">Agenda / Pokok Pembahasan</label>
                    <textarea id="agenda" rows="2" class="w-full px-4 py-3 border border-slate-300 rounded-lg focus:ring-2 focus:ring-slate-900 focus:border-slate-900 outline-none transition-all placeholder:text-slate-400 resize-y" placeholder="Tuliskan agenda utama rapat..." required></textarea>
                </div>

                <!-- Ringkasan Rapat -->
                <div>
                    <label for="ringkasan" class="block text-sm font-semibold text-slate-700 mb-2">Ringkasan Jalannya Rapat</label>
                    <textarea id="ringkasan" rows="6" class="w-full px-4 py-3 border border-slate-300 rounded-lg focus:ring-2 focus:ring-slate-900 focus:border-slate-900 outline-none transition-all placeholder:text-slate-400 resize-y" placeholder="Catat poin-poin penting diskusi, masukan, dan tanggapan di sini..." required></textarea>
                </div>

                <!-- Kesimpulan -->
                <div>
                    <label for="kesimpulan" class="block text-sm font-semibold text-slate-700 mb-2">Kesimpulan & Tindak Lanjut</label>
                    <textarea id="kesimpulan" rows="3" class="w-full px-4 py-3 border border-slate-300 rounded-lg focus:ring-2 focus:ring-slate-900 focus:border-slate-900 outline-none transition-all placeholder:text-slate-400 resize-y" placeholder="Apa keputusan akhirnya? Siapa yang bertanggung jawab untuk tindak lanjut?" required></textarea>
                </div>
            </div>

            <!-- KOLOM KANAN: Upload & Tombol Simpan (Mengambil 1/3 ruang) -->
            <div class="md:col-span-1 space-y-6">
                <!-- Box Upload Estetik -->
                <div class="bg-slate-50 p-5 rounded-xl border border-slate-200 h-full flex flex-col justify-between">
                    <div>
                        <label class="block text-sm font-bold text-slate-800 mb-3">Dokumentasi Rapat</label>
                        <p class="text-xs text-slate-500 mb-4 leading-relaxed">Lampirkan foto kegiatan rapat sebagai bukti fisik pelaporan.</p>
                        
                        <div class="flex justify-center px-6 pt-5 pb-6 border-2 border-slate-300 border-dashed rounded-lg bg-white hover:bg-slate-50 transition-colors cursor-pointer group relative">
                            <input id="foto" name="foto" type="file" accept="image/*" class="absolute inset-0 w-full h-full opacity-0 cursor-pointer z-10">
                            <div class="space-y-2 text-center">
                                <svg class="mx-auto h-10 w-10 text-slate-400 group-hover:text-slate-600 transition-colors" stroke="currentColor" fill="none" viewBox="0 0 48 48" aria-hidden="true">
                                    <path d="M28 8H12a4 4 0 00-4 4v20m32-12v8m0 0v8a4 4 0 01-4 4H12a4 4 0 01-4-4v-4m32-4l-3.172-3.172a4 4 0 00-5.656 0L28 28M8 32l9.172-9.172a4 4 0 015.656 0L28 28m0 0l4 4m4-24h8m-4-4v8m-12 4h.02" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />
                                </svg>
                                <div class="text-sm text-slate-600">
                                    <span class="font-semibold text-slate-900">Pilih file foto</span>
                                </div>
                                <p class="text-xs text-slate-500 font-medium" id="namaFileFoto">PNG atau JPG (Max 5MB)</p>
                            </div>
                        </div>
                    </div>

                    <!-- Submit Button diletakkan di bawah form upload -->
                    <div class="pt-6 mt-6 border-t border-slate-200">
                        <button type="button" id="btnSubmitNotulen" class="w-full bg-slate-900 hover:bg-slate-800 text-white font-bold py-3.5 px-4 rounded-lg transition-all focus:ring-4 focus:ring-slate-200 shadow-md hover:shadow-lg flex items-center justify-center gap-2">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor">
                                <path fill-rule="evenodd" d="M16.707 5.293a1 1 0 010 1.414l-8 8a1 1 0 01-1.414 0l-4-4a1 1 0 011.414-1.414L8 12.586l7.293-7.293a1 1 0 011.414 0z" clip-rule="evenodd" />
                            </svg>
                            Simpan Laporan
                        </button>
                    </div>
                </div>
            </div>
        </form>
    </div>

    <!-- JavaScript -->
    <script>
        let fotoDataBase64 = "";
        let fotoMimeType = "";
        let fotoName = "";

        document.getElementById('foto').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if(file) {
                // Potong nama file jika terlalu panjang agar tidak merusak UI
                let displayName = file.name;
                if(displayName.length > 20) {
                    displayName = displayName.substring(0, 17) + "...";
                }
                
                // Ubah teks warna menjadi hijau untuk indikator sukses pilih file
                const namaFileElement = document.getElementById('namaFileFoto');
                namaFileElement.innerText = "Terpilih: " + displayName;
                namaFileElement.classList.remove('text-slate-500');
                namaFileElement.classList.add('text-emerald-600');
                
                fotoMimeType = file.type;
                fotoName = file.name;

                const reader = new FileReader();
                reader.onload = function(event) {
                    fotoDataBase64 = event.target.result; 
                };
                reader.readAsDataURL(file);
            }
        });

        document.getElementById('btnSubmitNotulen').addEventListener('click', function() {
            
            const agenda = document.getElementById('agenda').value;
            const ringkasan = document.getElementById('ringkasan').value;
            const kesimpulan = document.getElementById('kesimpulan').value;

            if (!agenda || !ringkasan || !kesimpulan) {
                alert("Mohon lengkapi agenda, ringkasan, dan kesimpulan!");
                return;
            }

            const payload = {
                formType: 'notulen',
                agenda: agenda,
                ringkasan: ringkasan,
                kesimpulan: kesimpulan,
                fotoData: fotoDataBase64,
                fotoMimeType: fotoMimeType,
                fotoName: fotoName
            };

            const btn = document.getElementById('btnSubmitNotulen');
            const originalText = btn.innerHTML;
            btn.innerHTML = `
                <svg class="animate-spin -ml-1 mr-3 h-5 w-5 text-white" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                    <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                    <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                </svg>
                Menyimpan...
            `;
            btn.classList.add('opacity-70', 'cursor-not-allowed');
            btn.disabled = true;

            // Masukkan Link API Google Script Anda di sini
            const GOOGLE_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwKE3Se0Y-Kouz4McrLaEo6k7kbq-ee_ZNQVt8SwLVsxUiS2yMCF1ooDSJlAkd5eThIkw/exec";

            fetch(GOOGLE_SCRIPT_URL, {
                method: 'POST',
                body: JSON.stringify(payload)
            })
            .then(response => response.json())
            .then(result => {
                if (result.status === "success") {
                    alert("Berhasil! Notulen dan dokumentasi telah tersimpan.");
                    document.getElementById('formNotulen').reset();
                    
                    const namaFileElement = document.getElementById('namaFileFoto');
                    namaFileElement.innerText = "PNG atau JPG (Max 5MB)";
                    namaFileElement.classList.remove('text-emerald-600');
                    namaFileElement.classList.add('text-slate-500');
                    fotoDataBase64 = ""; 
                } else {
                    alert("Gagal menyimpan data: " + result.message);
                }
            })
            .catch(error => {
                alert("Terjadi kesalahan jaringan.");
                console.error(error);
            })
            .finally(() => {
                btn.innerHTML = originalText;
                btn.classList.remove('opacity-70', 'cursor-not-allowed');
                btn.disabled = false;
            });
        });
    </script>
</body>
</html>
