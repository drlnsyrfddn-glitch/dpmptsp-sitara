<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Presensi Kehadiran - SITARA Morowali</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://cdn.jsdelivr.net/npm/signature_pad@4.1.7/dist/signature_pad.umd.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f1f5f9; }
        .custom-shadow { box-shadow: 0 20px 60px -15px rgba(0, 0, 0, 0.1); }
        div:where(.swal2-container) div:where(.swal2-popup) { font-family: 'Inter', sans-serif; border-radius: 1.5rem; }
        canvas { touch-action: none; }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4 md:p-8">

    <div class="w-full max-w-2xl bg-white rounded-[2.5rem] overflow-hidden custom-shadow border border-slate-200">
        
        <div class="bg-[#0f172a] p-8 text-white relative border-b-4 border-blue-500">
            <div class="flex items-center gap-4 mb-6">
                <img src="assets/img/morowali.png" alt="Logo" class="h-12 w-auto">
                <div>
                    <h1 class="text-xl font-black uppercase tracking-tighter italic leading-tight">SITARA <span class="text-blue-400">PRESENSI</span></h1>
                    <p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">DPMPTSP Kabupaten Morowali</p>
                </div>
            </div>

            <div class="bg-slate-800/50 p-5 rounded-2xl border border-slate-700">
                <p class="text-[10px] font-black text-emerald-400 uppercase tracking-widest mb-1"><i class="fa-solid fa-calendar-check mr-1"></i> Agenda Rapat Saat Ini:</p>
                <h2 id="view-nama-rapat" class="text-lg font-bold text-white leading-tight">Memuat Data Agenda...</h2>
                <div class="flex flex-wrap gap-4 mt-3 text-xs font-semibold text-slate-300">
                    <span id="view-tgl"><i class="fa-regular fa-clock mr-1"></i> -</span>
                    <span id="view-lokasi"><i class="fa-solid fa-location-dot mr-1"></i> -</span>
                </div>
            </div>
        </div>

        <div class="p-8 space-y-6">
            <input type="hidden" id="in-jenis-rapat">

            <div id="div-kategori" class="hidden animate-fade-in">
                <label class="text-[10px] font-black text-blue-500 uppercase tracking-widest mb-2 block">1. Kategori Peserta / Tamu</label>
                <select id="in-kategori" onchange="aturFormByKategori()" class="w-full p-4 bg-blue-50 border border-blue-200 rounded-2xl outline-none focus:ring-2 focus:ring-blue-600 font-bold transition-all text-sm text-blue-800 shadow-inner">
                    <option value="" disabled selected>-- Silakan Pilih Kategori Anda --</option>
                    <option value="Internal DPMPTSP">Internal (Pegawai DPMPTSP)</option>
                    <option value="OPD Lain">OPD / Instansi Pemerintah Lain</option>
                    <option value="Perusahaan">Perusahaan / Pelaku Usaha</option>
                    <option value="Lainnya">Masyarakat / Lainnya</option>
                </select>
            </div>

            <div id="wrapper-form" class="space-y-6 hidden animate-fade-in">
                
                <div>
                    <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-2 block">Nama Lengkap & Gelar</label>
                    <input type="text" id="in-nama" list="list-pegawai" oninput="autofillPegawai()" placeholder="Ketik nama untuk mencari dari Master Data..." class="w-full p-4 bg-slate-50 border border-slate-200 rounded-2xl outline-none focus:ring-2 focus:ring-blue-600 font-bold transition-all text-sm text-slate-800">
                    <datalist id="list-pegawai"></datalist>
                    <p class="text-[9px] text-slate-400 mt-1 font-semibold italic">*Jika nama tidak ada di daftar, silakan ketik manual.</p>
                </div>

                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div id="div-nip">
                        <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-2 block">NIP (Gunakan "-" jika tidak ada)</label>
                        <input type="text" id="in-nip" placeholder="Contoh: 19980309..." class="w-full p-4 bg-slate-50 border border-slate-200 rounded-2xl outline-none focus:ring-2 focus:ring-blue-600 font-bold transition-all text-sm text-slate-800">
                    </div>
                    <div id="div-nohp" class="hidden">
                        <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-2 block">Nomor HP / WhatsApp</label>
                        <input type="tel" id="in-nohp" placeholder="Contoh: 08123456789" class="w-full p-4 bg-slate-50 border border-slate-200 rounded-2xl outline-none focus:ring-2 focus:ring-blue-600 font-bold transition-all text-sm text-slate-800">
                    </div>
                    <div>
                        <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-2 block">Jabatan / Posisi</label>
                        <input type="text" id="in-jabatan" placeholder="Contoh: Pranata Komputer / Direktur" class="w-full p-4 bg-slate-50 border border-slate-200 rounded-2xl outline-none focus:ring-2 focus:ring-blue-600 font-bold transition-all text-sm text-slate-800">
                    </div>
                </div>

                <div>
                    <label id="label-instansi" class="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-2 block">Instansi / OPD</label>
                    <input type="text" id="in-instansi" placeholder="Ketik instansi atau asal Anda..." class="w-full p-4 bg-slate-50 border border-slate-200 rounded-2xl outline-none focus:ring-2 focus:ring-blue-600 font-bold transition-all text-sm text-slate-800">
                </div>

                <div>
                    <div class="flex justify-between items-end mb-2">
                        <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest block">Tanda Tangan Digital</label>
                        <button onclick="signaturePad.clear()" class="text-[9px] font-bold text-red-500 hover:text-red-700 uppercase tracking-widest bg-red-50 px-3 py-1 rounded-lg transition-all">Hapus TTD</button>
                    </div>
                    <div class="border-2 border-dashed border-slate-300 rounded-2xl bg-slate-50 overflow-hidden relative">
                        <canvas id="canvas-ttd" class="w-full h-40 cursor-crosshair"></canvas>
                    </div>
                </div>

                <button onclick="kirimAbsen()" id="btn-kirim" class="w-full py-5 mt-4 bg-blue-600 hover:bg-blue-700 text-white rounded-2xl font-black uppercase tracking-widest shadow-xl shadow-blue-200 transition-all active:scale-95 flex justify-center items-center gap-2">
                    <i class="fa-solid fa-paper-plane"></i> KIRIM PRESENSI
                </button>
            </div>
        </div>
    </div>

    <script>
        // MASUKKAN URL WEB APP BAPAK DI SINI
        const GOOGLE_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwKE3Se0Y-Kouz4McrLaEo6k7kbq-ee_ZNQVt8SwLVsxUiS2yMCF1ooDSJlAkd5eThIkw/exec";
        
        const urlParams = new URLSearchParams(window.location.search);
        const idRapat = urlParams.get('id');
        
        let signaturePad;
        let masterDataPegawai = [];

        window.onload = async function() {
            const canvas = document.getElementById('canvas-ttd');
            function resizeCanvas() {
                const ratio =  Math.max(window.devicePixelRatio || 1, 1);
                canvas.width = canvas.offsetWidth * ratio;
                canvas.height = canvas.offsetHeight * ratio;
                canvas.getContext("2d").scale(ratio, ratio);
            }
            window.onresize = resizeCanvas;
            resizeCanvas();
            signaturePad = new SignaturePad(canvas, { penColor: "rgb(15, 23, 42)", backgroundColor: "rgb(248, 250, 252)" });

            if(!idRapat) {
                Swal.fire('Akses Ditolak', 'QR Code / Link rapat tidak valid!', 'error');
                return;
            }

            // 1. Load Data Rapat
            try {
                const resRapat = await fetch(GOOGLE_SCRIPT_URL, { method: 'POST', body: JSON.stringify({ formType: 'getDetailRapat', idRapat: idRapat }) });
                const dataRapat = await resRapat.json();
                
                if(dataRapat.status === 'success' && dataRapat.data) {
                    if(dataRapat.data.status !== "AKTIF") {
                        Swal.fire('Sesi Ditutup', 'Sesi absensi untuk rapat ini telah dikunci oleh Admin.', 'warning');
                        document.getElementById('btn-kirim').disabled = true;
                        document.getElementById('btn-kirim').classList.replace('bg-blue-600', 'bg-slate-400');
                    }
                    
                    document.getElementById('view-nama-rapat').innerText = dataRapat.data.nama;
                    document.getElementById('view-lokasi').innerHTML = `<i class="fa-solid fa-location-dot mr-1"></i> ${dataRapat.data.lokasi}`;
                    document.getElementById('in-jenis-rapat').value = dataRapat.data.jenis;
                    
                    let tglStr = dataRapat.data.tgl;
                    if(tglStr && tglStr.includes("-")) {
                        const pts = tglStr.split("-");
                        if(pts.length === 3) tglStr = new Date(pts[0], pts[1]-1, pts[2]).toLocaleDateString('id-ID', { day: '2-digit', month: 'short', year: 'numeric' });
                    }
                    let jamStr = dataRapat.data.waktu ? dataRapat.data.waktu.substring(0,5) : "";
                    document.getElementById('view-tgl').innerHTML = `<i class="fa-regular fa-clock mr-1"></i> ${tglStr} | ${jamStr} WITA`;

                    // LOGIKA TAMPILAN AWAL BERDASARKAN JENIS RAPAT
                    if(dataRapat.data.jenis === "Lintas OPD") {
                        document.getElementById('div-kategori').classList.remove('hidden');
                        // Wrapper form dibiarkan hidden sampai kategori dipilih
                    } else {
                        // Jika rapat Internal, paksa kategori ke Internal dan langsung tampilkan form
                        document.getElementById('in-kategori').value = "Internal DPMPTSP";
                        aturFormByKategori();
                    }
                }
            } catch (e) { console.error("Gagal memuat detail rapat."); }

            // 2. Load Master Data Pegawai
            try {
                const resPegawai = await fetch(GOOGLE_SCRIPT_URL, { method: 'POST', body: JSON.stringify({ formType: 'getMasterPegawai' }) });
                const dataPegawai = await resPegawai.json();
                
                if (dataPegawai.status === 'success') {
                    masterDataPegawai = dataPegawai.data;
                    const datalist = document.getElementById('list-pegawai');
                    masterDataPegawai.forEach(p => {
                        let option = document.createElement('option');
                        option.value = p.nama;
                        datalist.appendChild(option);
                    });
                }
            } catch (e) { console.error("Gagal memuat master pegawai."); }
        };

        // FUNGSI SUPER ADAPTIF: Mengubah form berdasarkan Kategori Peserta
        function aturFormByKategori() {
            const kategori = document.getElementById('in-kategori').value;
            const wrapperForm = document.getElementById('wrapper-form');
            const divNip = document.getElementById('div-nip');
            const divNoHp = document.getElementById('div-nohp');
            const inputInstansi = document.getElementById('in-instansi');
            const labelInstansi = document.getElementById('label-instansi');

            // Tampilkan form jika sebelumnya disembunyikan
            wrapperForm.classList.remove('hidden');
            
            // Reset state input instansi
            inputInstansi.readOnly = false;
            inputInstansi.classList.remove('bg-slate-100', 'cursor-not-allowed');

            if (kategori === "Internal DPMPTSP") {
                divNip.classList.remove('hidden');
                divNoHp.classList.add('hidden');
                labelInstansi.innerText = "Instansi / OPD";
                inputInstansi.value = "DPMPTSP Kabupaten Morowali";
                inputInstansi.readOnly = true;
                inputInstansi.classList.add('bg-slate-100', 'cursor-not-allowed');
            } 
            else if (kategori === "OPD Lain") {
                divNip.classList.remove('hidden');
                divNoHp.classList.add('hidden');
                labelInstansi.innerText = "Instansi / OPD";
                inputInstansi.value = "";
                inputInstansi.placeholder = "Nama Dinas / Instansi Pemerintah...";
            } 
            else if (kategori === "Perusahaan") {
                divNip.classList.add('hidden'); // Sembunyikan NIP
                divNoHp.classList.remove('hidden'); // Munculkan No HP
                labelInstansi.innerText = "Nama Perusahaan / Badan Usaha";
                inputInstansi.value = "";
                inputInstansi.placeholder = "Contoh: PT. IMIP, CV. Maju Jaya...";
            } 
            else {
                // Untuk Masyarakat / Lainnya
                divNip.classList.add('hidden');
                divNoHp.classList.remove('hidden');
                labelInstansi.innerText = "Asal / Domisili / Organisasi";
                inputInstansi.value = "";
                inputInstansi.placeholder = "Ketik asal domisili atau organisasi Anda...";
            }
        }

        function autofillPegawai() {
            const inputNama = document.getElementById('in-nama').value;
            const pegawaiDitemukan = masterDataPegawai.find(p => p.nama === inputNama);
            
            if (pegawaiDitemukan) {
                document.getElementById('in-nip').value = pegawaiDitemukan.nip;
                document.getElementById('in-jabatan').value = pegawaiDitemukan.jabatan;
                
                const divKategori = document.getElementById('div-kategori');
                const selectKategori = document.getElementById('in-kategori');
                
                // Jika form memiliki pilihan kategori (Lintas OPD)
                if (!divKategori.classList.contains('hidden')) {
                    if (pegawaiDitemukan.instansi.toLowerCase().includes("dpmptsp")) {
                        selectKategori.value = "Internal DPMPTSP";
                    } else {
                        selectKategori.value = "OPD Lain";
                    }
                    aturFormByKategori();
                }

                document.getElementById('in-instansi').value = pegawaiDitemukan.instansi;
                
                // Efek visual sukses autofill
                ['in-nip', 'in-jabatan', 'in-instansi'].forEach(id => {
                    const el = document.getElementById(id);
                    if(!el.classList.contains('hidden')) {
                        el.classList.add('bg-emerald-50', 'border-emerald-200');
                        setTimeout(() => el.classList.remove('bg-emerald-50', 'border-emerald-200'), 1000);
                    }
                });
            }
        }

        async function kirimAbsen() {
            const divKategori = document.getElementById('div-kategori');
            const kategoriValue = document.getElementById('in-kategori').value;
            
            if (!divKategori.classList.contains('hidden') && !kategoriValue) {
                return Swal.fire('Kategori Kosong', 'Mohon pilih kategori peserta pada nomor 1.', 'warning');
            }

            if (signaturePad.isEmpty()) return Swal.fire('Tanda Tangan Kosong', 'Mohon isi tanda tangan Anda terlebih dahulu.', 'warning');
            if (!document.getElementById('in-nama').value) return Swal.fire('Nama Kosong', 'Mohon isi nama lengkap Anda.', 'warning');

            const btn = document.getElementById('btn-kirim');
            btn.disabled = true;
            btn.innerHTML = `<i class="fa-solid fa-spinner fa-spin"></i> MENGIRIM DATA...`;

            // Trik cerdas: Jika kategori perusahaan, kirim no HP ke kolom NIP di database agar terekam tanpa merusak struktur tabel.
            const nipAtauHp = (kategoriValue === "Perusahaan" || kategoriValue === "Lainnya") 
                              ? document.getElementById('in-nohp').value 
                              : document.getElementById('in-nip').value;

            const dataKirim = {
                formType: "kehadiran",
                idRapat: idRapat,
                jenisRapat: document.getElementById('in-jenis-rapat').value,
                nama: document.getElementById('in-nama').value,
                nip: nipAtauHp || "-",
                jabatan: document.getElementById('in-jabatan').value || "-",
                instansi: document.getElementById('in-instansi').value || "DPMPTSP Kabupaten Morowali",
                signature: signaturePad.toDataURL()
            };

            try {
                const response = await fetch(GOOGLE_SCRIPT_URL, { method: 'POST', body: JSON.stringify(dataKirim) });
                const resData = await response.json();

                if (resData.status === "success") {
                    Swal.fire({ icon: 'success', title: 'Berhasil Absen!', text: 'Terima kasih atas kehadiran Anda.', confirmButtonColor: '#059669' })
                    .then(() => { 
                        window.location.reload(); // Refresh halaman untuk mereset seluruh form
                    });
                } else {
                    Swal.fire('Peringatan', resData.message || 'Anda sepertinya sudah terdaftar di sesi ini.', 'warning');
                }
            } catch (e) {
                Swal.fire('Error Koneksi', 'Gagal mengirim data. Pastikan internet Anda stabil.', 'error');
            } finally {
                btn.disabled = false;
                btn.innerHTML = `<i class="fa-solid fa-paper-plane"></i> KIRIM PRESENSI`;
            }
        }
    </script>
</body>
</html>
