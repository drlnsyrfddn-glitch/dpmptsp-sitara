<!DOCTYPE html>
<html lang="id" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Daftar Hadir - SITARA DPMPTSP</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; }
        .bg-pola { background-image: radial-gradient(#cbd5e1 1px, transparent 1px); background-size: 20px 20px; }
        canvas { touch-action: none; }
    </style>
</head>
<body class="bg-pola text-slate-800 antialiased min-h-screen flex items-center justify-center p-4">

    <div class="w-full max-w-lg bg-white rounded-[2.5rem] shadow-2xl border border-slate-100 overflow-hidden relative">
        <div class="bg-[#0f172a] p-8 text-center relative overflow-hidden">
            <div class="absolute top-0 left-0 w-full h-full bg-[radial-gradient(ellipse_at_top_right,_var(--tw-gradient-stops))] from-slate-700/40 via-transparent to-transparent"></div>
            <div class="flex justify-center items-center gap-3 mb-4 relative z-10">
                <img src="assets/img/morowali.png" alt="Logo Morowali" class="h-10 w-auto drop-shadow-md">
                <img src="assets/img/logo_mpp.webp" alt="Logo MPP" class="h-10 w-auto drop-shadow-md bg-white rounded-lg p-0.5">
            </div>
            <h1 class="text-2xl font-black text-white tracking-tight relative z-10">Daftar Hadir Peserta</h1>
            <p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest mt-1 relative z-10">SITARA - DPMPTSP Morowali</p>
        </div>

        <div id="info-rapat" class="bg-slate-50 border-b border-slate-100 p-6 text-center">
            <div class="animate-pulse flex flex-col items-center gap-2">
                <div class="h-4 bg-slate-200 rounded w-3/4"></div>
                <div class="h-3 bg-slate-200 rounded w-1/2"></div>
            </div>
        </div>

        <div class="p-8 space-y-5">
            
            <div id="box-kategori" class="hidden bg-slate-50 p-5 rounded-2xl border border-slate-200 shadow-inner">
                <label class="text-[10px] font-extrabold text-slate-500 uppercase tracking-widest block mb-3 text-center">Anda Hadir Sebagai:</label>
                <div class="grid grid-cols-1 sm:grid-cols-3 gap-3">
                    <label class="flex items-center gap-2 cursor-pointer bg-white p-3 rounded-xl border border-slate-200 hover:border-blue-400 transition-all">
                        <input type="radio" name="kategori" value="Lintas OPD" onchange="ubahForm()" class="accent-blue-600">
                        <span class="text-[11px] font-bold text-slate-700 leading-tight">Pemerintah <br><span class="text-[9px] text-slate-400 font-normal">OPD / Dinas</span></span>
                    </label>
                    <label class="flex items-center gap-2 cursor-pointer bg-white p-3 rounded-xl border border-slate-200 hover:border-blue-400 transition-all">
                        <input type="radio" name="kategori" value="Perusahaan" onchange="ubahForm()" class="accent-blue-600">
                        <span class="text-[11px] font-bold text-slate-700 leading-tight">Perusahaan <br><span class="text-[9px] text-slate-400 font-normal">Swasta / Umum</span></span>
                    </label>
                    <label class="flex items-center gap-2 cursor-pointer bg-white p-3 rounded-xl border border-slate-200 hover:border-blue-400 transition-all">
                        <input type="radio" name="kategori" value="Internal" onchange="ubahForm()" class="accent-blue-600">
                        <span class="text-[11px] font-bold text-slate-700 leading-tight">Internal <br><span class="text-[9px] text-slate-400 font-normal">DPMPTSP</span></span>
                    </label>
                </div>
            </div>

            <div>
                <label class="text-[10px] font-bold text-slate-400 uppercase tracking-widest ml-1 block mb-2">Nama Lengkap & Gelar</label>
                <input type="text" id="nama" class="w-full p-4 bg-slate-50 border border-slate-200 rounded-2xl outline-none focus:ring-2 focus:ring-blue-600 transition-all font-semibold text-slate-700" placeholder="Ketik nama Anda...">
            </div>
            
            <div id="grid-dinamis" class="grid grid-cols-1 md:grid-cols-2 gap-5 transition-all">
                
                <div id="wrap-status-pegawai" class="hidden">
                    <label class="text-[10px] font-bold text-slate-400 uppercase tracking-widest ml-1 block mb-2">Status Kepegawaian</label>
                    <select id="status-pegawai" onchange="ubahForm()" class="w-full p-4 bg-slate-50 border border-slate-200 rounded-2xl outline-none focus:ring-2 focus:ring-blue-600 transition-all font-semibold text-slate-700">
                        <option value="PNS">PNS</option>
                        <option value="PPPK">PPPK</option>
                        <option value="Outsourcing">Outsourcing</option>
                    </select>
                </div>

                <div id="wrap-kontak" class="hidden">
                    <label id="label-kontak" class="text-[10px] font-bold text-slate-400 uppercase tracking-widest ml-1 block mb-2">NIP / No HP</label>
                    <input type="text" id="kontak" class="w-full p-4 bg-slate-50 border border-slate-200 rounded-2xl outline-none focus:ring-2 focus:ring-blue-600 transition-all font-semibold text-slate-700" placeholder="...">
                </div>
                
                <div id="wrap-instansi" class="hidden">
                    <label id="label-instansi" class="text-[10px] font-bold text-slate-400 uppercase tracking-widest ml-1 block mb-2">Asal Instansi</label>
                    <input type="text" id="instansi" class="w-full p-4 bg-slate-50 border border-slate-200 rounded-2xl outline-none focus:ring-2 focus:ring-blue-600 transition-all font-semibold text-slate-700" placeholder="...">
                </div>
                
                <div class="md:col-span-2" id="wrap-jabatan">
                    <label class="text-[10px] font-bold text-slate-400 uppercase tracking-widest ml-1 block mb-2">Jabatan</label>
                    <input type="text" id="jabatan" class="w-full p-4 bg-slate-50 border border-slate-200 rounded-2xl outline-none focus:ring-2 focus:ring-blue-600 transition-all font-semibold text-slate-700" placeholder="Jabatan Anda...">
                </div>
            </div>

            <div>
                <div class="flex justify-between items-end mb-2 mt-2">
                    <label class="text-[10px] font-bold text-slate-400 uppercase tracking-widest ml-1 block">Tanda Tangan Digital</label>
                    <button onclick="clearCanvas()" class="text-[9px] font-bold text-red-500 hover:text-red-700 uppercase tracking-widest transition-colors bg-red-50 px-2 py-1 rounded-lg">Hapus / Ulang</button>
                </div>
                <div class="border-2 border-dashed border-slate-300 rounded-2xl bg-slate-50 overflow-hidden relative group">
                    <canvas id="signature-pad" class="w-full h-40 cursor-crosshair"></canvas>
                    <div class="absolute inset-0 flex items-center justify-center pointer-events-none opacity-20 group-hover:opacity-10 transition-opacity">
                        <svg class="w-12 h-12 text-slate-800" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15.232 5.232l3.536 3.536m-2.036-5.036a2.5 2.5 0 113.536 3.536L6.5 21.036H3v-3.572L16.732 3.732z"></path></svg>
                    </div>
                </div>
            </div>

            <button onclick="submitAbsen()" id="btn-submit" class="w-full py-4 mt-4 bg-blue-600 text-white rounded-2xl font-bold uppercase text-xs tracking-widest shadow-xl hover:bg-blue-700 active:scale-95 transition-all flex justify-center items-center gap-2">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                Kirim Daftar Hadir
            </button>
        </div>
        <div class="text-center py-4 bg-slate-50 border-t border-slate-100">
            <p class="text-[9px] font-bold text-slate-400 uppercase tracking-widest">&copy; 2026 Powered by FOUNDERLAN</p>
        </div>
    </div>

    <script>
        const GOOGLE_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwKE3Se0Y-Kouz4McrLaEo6k7kbq-ee_ZNQVt8SwLVsxUiS2yMCF1ooDSJlAkd5eThIkw/exec";
        
        const urlParams = new URLSearchParams(window.location.search);
        const idRapat = urlParams.get('id');
        let jenisRapatTerkini = ""; 

        const canvas = document.getElementById('signature-pad');
        const ctx = canvas.getContext('2d');
        let isDrawing = false;
        let hasSignature = false; 

        function resizeCanvas() {
            const ratio = Math.max(window.devicePixelRatio || 1, 1);
            canvas.width = canvas.offsetWidth * ratio;
            canvas.height = canvas.offsetHeight * ratio;
            ctx.scale(ratio, ratio);
            ctx.lineCap = 'round'; ctx.lineJoin = 'round'; ctx.lineWidth = 3; ctx.strokeStyle = '#0f172a';
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        function getPos(e) {
            const rect = canvas.getBoundingClientRect();
            let x, y;
            if (e.touches) { x = e.touches[0].clientX - rect.left; y = e.touches[0].clientY - rect.top; } 
            else { x = e.clientX - rect.left; y = e.clientY - rect.top; }
            return { x, y };
        }

        function startDrawing(e) { e.preventDefault(); isDrawing = true; const pos = getPos(e); ctx.beginPath(); ctx.moveTo(pos.x, pos.y); }
        function draw(e) { if (!isDrawing) return; e.preventDefault(); const pos = getPos(e); ctx.lineTo(pos.x, pos.y); ctx.stroke(); hasSignature = true; }
        function stopDrawing(e) { if (!isDrawing) return; e.preventDefault(); isDrawing = false; ctx.closePath(); }

        canvas.addEventListener('mousedown', startDrawing); canvas.addEventListener('mousemove', draw);
        canvas.addEventListener('mouseup', stopDrawing); canvas.addEventListener('mouseout', stopDrawing);
        canvas.addEventListener('touchstart', startDrawing, {passive: false}); canvas.addEventListener('touchmove', draw, {passive: false}); canvas.addEventListener('touchend', stopDrawing);
        function clearCanvas() { ctx.clearRect(0, 0, canvas.width, canvas.height); hasSignature = false; }

        function ubahForm() {
            let kat = 'Internal';
            const boxKategori = document.getElementById('box-kategori');
            if (!boxKategori.classList.contains('hidden')) {
                const radioChecked = document.querySelector('input[name="kategori"]:checked');
                if (radioChecked) kat = radioChecked.value;
            }

            const wStatus = document.getElementById('wrap-status-pegawai');
            const iStatus = document.getElementById('status-pegawai').value;
            
            const wKontak = document.getElementById('wrap-kontak');
            const lKontak = document.getElementById('label-kontak');
            const iKontak = document.getElementById('kontak');
            
            const wInstansi = document.getElementById('wrap-instansi');
            const lInstansi = document.getElementById('label-instansi');
            const iInstansi = document.getElementById('instansi');

            if (kat === 'Internal') {
                wInstansi.classList.add('hidden'); 
                wStatus.classList.remove('hidden'); 
                
                if (iStatus === 'PNS' || iStatus === 'PPPK') {
                    wKontak.classList.remove('hidden');
                    lKontak.innerText = "Nomor Induk Pegawai (NIP)";
                    iKontak.placeholder = "Masukkan NIP Anda...";
                } else {
                    wKontak.classList.add('hidden'); 
                }
            } else if (kat === 'Lintas OPD') {
                wStatus.classList.add('hidden');
                wKontak.classList.remove('hidden');
                wInstansi.classList.remove('hidden');
                
                lKontak.innerText = "NIP (Opsional)";
                iKontak.placeholder = "19820309...";
                lInstansi.innerText = "Asal OPD / Dinas";
                iInstansi.placeholder = "Dinas Kesehatan...";
            } else if (kat === 'Perusahaan') {
                wStatus.classList.add('hidden');
                wKontak.classList.remove('hidden');
                wInstansi.classList.remove('hidden');
                
                lKontak.innerText = "No. WhatsApp / HP";
                iKontak.placeholder = "0812...";
                lInstansi.innerText = "Nama Perusahaan";
                iInstansi.placeholder = "PT. Bintang...";
            }
        }

        async function muatInfoRapat() {
            if (!idRapat) {
                document.getElementById('info-rapat').innerHTML = '<p class="text-red-500 font-bold text-sm">ID Rapat tidak ditemukan.</p>';
                document.getElementById('btn-submit').disabled = true; return;
            }

            try {
                const response = await fetch(GOOGLE_SCRIPT_URL, { method: 'POST', body: JSON.stringify({ formType: 'getSemuaRapat' }) });
                const res = await response.json();
                
                if (res.status === "success") {
                    const rapat = res.data.find(r => r.id === idRapat);
                    if (rapat) {
                        if (rapat.status !== "AKTIF") {
                            document.getElementById('info-rapat').innerHTML = `
                                <h2 class="text-lg font-black text-slate-800 leading-tight mb-2">${rapat.nama}</h2>
                                <span class="bg-red-100 text-red-600 px-3 py-1 rounded-full text-[10px] font-extrabold tracking-widest border border-red-200 uppercase">SESI TELAH DITUTUP</span>
                            `;
                            const btn = document.getElementById('btn-submit');
                            btn.disabled = true;
                            btn.classList.replace('bg-blue-600', 'bg-slate-400');
                            btn.innerHTML = 'SESI PRESENSI BERAKHIR';
                            document.getElementById('nama').disabled = true;
                            document.getElementById('jabatan').disabled = true;
                            document.getElementById('instansi').disabled = true;
                            document.getElementById('kontak').disabled = true;
                            document.getElementById('status-pegawai').disabled = true;
                            document.querySelectorAll('input[name="kategori"]').forEach(r => r.disabled = true);
                            return; 
                        }

                        jenisRapatTerkini = rapat.jenis; 
                        const boxKategori = document.getElementById('box-kategori');
                        if (jenisRapatTerkini === 'Internal') {
                            boxKategori.classList.add('hidden'); 
                        } else {
                            boxKategori.classList.remove('hidden'); 
                            document.querySelector('input[value="Lintas OPD"]').checked = true;
                        }
                        
                        ubahForm(); 

                        const tgl = new Date(rapat.tgl).toLocaleDateString('id-ID', { weekday: 'long', day: '2-digit', month: 'long', year: 'numeric' });
                        const jam = new Date(rapat.waktu).toLocaleTimeString('id-ID', { hour: '2-digit', minute: '2-digit' });
                        
                        document.getElementById('info-rapat').innerHTML = `
                            <h2 class="text-lg font-black text-slate-800 leading-tight mb-2">${rapat.nama}</h2>
                            <div class="flex flex-wrap items-center justify-center gap-2 text-[11px] font-semibold text-slate-500">
                                <span class="bg-blue-50 text-blue-600 px-2 py-1 rounded border border-blue-100">${tgl}</span>
                                <span>•</span><span>${jam} WITA</span><span>•</span><span>${rapat.lokasi}</span>
                            </div>
                        `;
                    } else {
                        document.getElementById('info-rapat').innerHTML = '<p class="text-red-500 font-bold text-sm">Agenda tidak ditemukan.</p>';
                        document.getElementById('btn-submit').disabled = true;
                    }
                }
            } catch (err) {
                document.getElementById('info-rapat').innerHTML = '<p class="text-red-500 font-bold text-sm">Gagal terhubung ke server.</p>';
            }
        }
        window.addEventListener('DOMContentLoaded', muatInfoRapat);

        async function submitAbsen() {
            const namaIn = document.getElementById('nama').value.trim();
            const jabatanIn = document.getElementById('jabatan').value.trim();
            const instansiIn = document.getElementById('instansi').value.trim();
            const kontakIn = document.getElementById('kontak').value.trim();
            const statusPegawai = document.getElementById('status-pegawai').value;
            
            let kat = 'Internal';
            const boxKategori = document.getElementById('box-kategori');
            if (!boxKategori.classList.contains('hidden')) {
                const radioChecked = document.querySelector('input[name="kategori"]:checked');
                if (radioChecked) kat = radioChecked.value;
            }

            if (!namaIn || !jabatanIn) {
                return Swal.fire({ icon: 'warning', title: 'Data Belum Lengkap', text: 'Nama dan Jabatan wajib diisi.', confirmButtonColor: '#0f172a' });
            }
            if (!hasSignature) {
                return Swal.fire({ icon: 'warning', title: 'Tanda Tangan Kosong', text: 'Mohon bubuhkan tanda tangan digital Anda.', confirmButtonColor: '#0f172a' });
            }

            // --- PERBAIKAN LOGIKA DUPLIKASI ---
            let finalInstansi = "DPMPTSP Kab. Morowali";
            let finalJabatan = jabatanIn; 
            let sendKontak = kontakIn || "-";

            if (kat === 'Internal') {
                // Untuk Internal, Jabatan diberi embel-embel status kepegawaian agar jelas
                finalJabatan = `${jabatanIn} (${statusPegawai})`;
            } else {
                // Untuk Umum/Perusahaan, Jabatan dibiarkan murni agar tidak dobel
                finalInstansi = instansiIn;
            }

            // --- PERBAIKAN LOGIKA ANGKA 0 HILANG ---
            // Jika input berisi nomor HP/NIP (angka), beri tanda petik agar terbaca sebagai teks di Sheets
            if (sendKontak !== "-" && /^\d+$/.test(sendKontak)) {
                sendKontak = "'" + sendKontak;
            }

            const ttdBase64 = canvas.toDataURL(); 
            const btn = document.getElementById('btn-submit');
            btn.innerHTML = '<div class="animate-spin rounded-full h-5 w-5 border-b-2 border-white"></div> Mengirim...';
            btn.disabled = true;
            Swal.fire({ title: 'Menyimpan Kehadiran...', allowOutsideClick: false, didOpen: () => Swal.showLoading() });

            try {
                const response = await fetch(GOOGLE_SCRIPT_URL, {
                    method: 'POST',
                    body: JSON.stringify({
                        formType: 'kehadiran', 
                        idRapat: idRapat,
                        jenisRapat: jenisRapatTerkini, 
                        nama: namaIn,
                        instansi: finalInstansi,
                        nip: sendKontak, // Mengirim data kontak yang sudah dipasangi tanda petik
                        jabatan: finalJabatan,
                        signature: ttdBase64 
                    })
                });
                const res = await response.json();

                if (res.status === "success") {
                    Swal.fire({
                        icon: 'success', title: 'Kehadiran Tercatat!', text: 'Terima kasih, Anda telah terdaftar dalam rapat ini.',
                        confirmButtonColor: '#0f172a', allowOutsideClick: false
                    }).then(() => {
                        btn.innerText = "Terima Kasih ✓";
                        btn.classList.replace('bg-blue-600', 'bg-emerald-600');
                    });
                } else {
                    Swal.fire('Peringatan!', res.message || 'Terjadi kesalahan sistem, silakan coba lagi.', 'warning');
                    btn.innerHTML = 'Kirim Daftar Hadir'; btn.disabled = false;
                }
            } catch (err) {
                Swal.fire('Gagal Terhubung', 'Periksa koneksi internet Anda.', 'error');
                btn.innerHTML = 'Kirim Daftar Hadir'; btn.disabled = false;
            }
        }
    </script>
</body>
</html>
